name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify compiled entrypoint
        run: |
          python3 - <<'PY'
          from pathlib import Path
          index = Path("dist/index.html")
          if not index.exists():
              raise SystemExit("dist/index.html was not generated")
          html = index.read_text(encoding="utf-8")
          if "/src/master.jsx" in html:
              raise SystemExit("Build output still references /src/master.jsx")
          if "/assets/" not in html and "./assets/" not in html:
              raise SystemExit("Build output missing compiled assets reference")
          print("Build output verified: compiled assets detected.")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
